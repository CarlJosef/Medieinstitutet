<!DOCTYPE html>
<html lang="sv">
<head>
    <!-- Teckenkodning: ska alltid vara UTF-8 -->
    <meta charset="utf-8">
    <!-- Sidans titel som syns i webbläsarens flik -->
    <title>Min flashiga meta tagg sida</title>
    <!-- Meta taggar för sökmotorer och eventuell SEO -->
    <meta name="description" content="Detta är en enkel html-sida som visar hur man använder meta taggar">
    <!-- Nyckelord för sidan vid användning av exempelvis Google SEO -->
    <meta name="keywords" content="html, meta, sökmotor, exempel, taggar, grundläggande">
    <!-- Utvecklarens namn -->
    <meta name="author" content="Carl Josef">
</head>
<body>
    <h1>Exempel på meta-taggar!</h1>
    <p>Vill du se meta-taggarna? ;) Kolla källkoden!</p>
</body>
</html>
