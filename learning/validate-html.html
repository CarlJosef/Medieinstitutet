<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <title>Behöver du validera din kod? sweet!</title>
  </head>
  <body>
    <h1>Så här validerar du ett HTML-dokument</h1>
    <ol>
      <li>Skriv eller öppna din <code>.html</code>-fil i VS Code.</li>
      <li>
        Markera hela koden (<kbd>kopiera</kbd>, <kbd>sedan</kbd>,
        <kbd>klistra in</kbd>).
      </li>
      <li>
        Gå till
        <a href="https://validator.w3.org/" target="_blank">validator.w3.org</a
        >.
      </li>
      <li>Klistra in din kod i rutan (“Direct Input”).</li>
      <li>tryck på “Check”.</li>
      <li>Korrigera fel eller varningar om det behövs.</li>
    </ol>
  </body>
</html>
